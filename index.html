<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F2F1EC" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>GVR Fitness Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="assets/fonts/fonts.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script>
    (function() {
      try {
        var saved = JSON.parse(localStorage.getItem('gvr-data-v1') || '{}').tema;
        var t = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'slate' : 'chalk');
        document.documentElement.dataset.theme = t;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = t === 'slate' ? '#141310' : '#F2F1EC';
      } catch(e) {}
    })();
  </script>
  <script>window.APP_VERSION = '0.9.4';</script>
</head>
<body>

  <!-- Onboarding -->
  <div id="view-onboarding" class="view"></div>

  <!-- Program generat -->
  <div id="view-program" class="view"></div>

  <!-- Dashboard -->
  <div id="view-dashboard" class="view"></div>

  <!-- Antrenamentul zilei (placeholder Etapa 4) -->
  <div id="view-today" class="view"></div>

  <!-- Profil -->
  <div id="view-profil" class="view"></div>

  <!-- Statistici (hub: Sumar / Progres / Recorduri) -->
  <div id="view-statistici" class="view"></div>

  <!-- Calendar lunar -->
  <div id="view-calendar" class="view"></div>

  <!-- Configurare skandenberg (mini-onboarding) -->
  <div id="view-skand" class="view"></div>

  <!-- Navigație principală (bottom bar pe mobil, sidebar pe desktop) -->
  <nav id="app-nav" class="app-nav" hidden>
    <a class="nav-logo" href="#" aria-label="GVR Fitness">
      <svg viewBox="0 0 120 120" width="28" height="28" aria-hidden="true" style="flex-shrink:0;">
        <rect x="26" y="42" width="10" height="36" rx="3.5" fill="currentColor"/>
        <rect x="84" y="42" width="10" height="36" rx="3.5" fill="currentColor"/>
        <rect x="14" y="49" width="8" height="22" rx="3" fill="currentColor"/>
        <rect x="98" y="49" width="8" height="22" rx="3" fill="currentColor"/>
        <line x1="34" y1="60" x2="86" y2="60" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        <rect x="52" y="55" width="16" height="10" rx="2.5" fill="var(--accent)"/>
      </svg>
      <span class="nav-wordmark">G<span style="color:var(--accent);">V</span>R<span class="nav-wordmark-sub">FITNESS</span></span>
    </a>
    <button class="nav-item" data-nav="dashboard">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="nav-lbl">Acasă</span>
    </button>
    <button class="nav-item nav-item-cta" data-nav="start">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></span>
      <span class="nav-lbl">Antrenează</span>
    </button>
    <button class="nav-item" data-nav="program">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
      <span class="nav-lbl">Program</span>
    </button>
    <button class="nav-item" data-nav="statistici">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="nav-lbl">Statistici</span>
    </button>
    <button class="nav-item nav-item-theme" id="btn-theme-toggle" aria-label="Schimbă tema">
      <span class="nav-ico" id="theme-toggle-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </span>
      <span class="nav-lbl">Temă</span>
    </button>
    <button class="nav-item" data-nav="profil">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="nav-lbl">Profil</span>
    </button>
  </nav>

  <!-- Reset ascuns (dev) -->
  <button id="btn-reset" style="position:fixed;bottom:8px;right:8px;opacity:.15;font-size:10px;padding:4px 8px;background:var(--surf2);color:var(--t2);border-radius:4px;z-index:999">reset</button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
