<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GVR Fitness Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
  <script>window.APP_VERSION = '0.7.0';</script>
</head>
<body>

  <!-- Onboarding -->
  <div id="view-onboarding" class="view"></div>

  <!-- Program generat -->
  <div id="view-program" class="view"></div>

  <!-- Dashboard -->
  <div id="view-dashboard" class="view"></div>

  <!-- Antrenamentul zilei (placeholder Etapa 4) -->
  <div id="view-today" class="view"></div>

  <!-- Navigație principală (bottom bar pe mobil, sidebar pe desktop) -->
  <nav id="app-nav" class="app-nav" hidden>
    <a class="nav-logo" href="#" aria-label="GVR Fitness">
      <img src="assets/logo.png" alt="GVR Fitness" />
    </a>
    <button class="nav-item" data-nav="dashboard">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="nav-lbl">Acasă</span>
    </button>
    <button class="nav-item nav-item-cta" data-nav="start">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></span>
      <span class="nav-lbl">Antrenează</span>
    </button>
    <button class="nav-item" data-nav="program">
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
      <span class="nav-lbl">Program</span>
    </button>
    <button class="nav-item nav-item-soon" data-nav="statistici" disabled>
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="nav-lbl">Statistici</span>
    </button>
    <button class="nav-item nav-item-soon" data-nav="profil" disabled>
      <span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="nav-lbl">Profil</span>
    </button>
  </nav>

  <!-- Reset ascuns (dev) -->
  <button id="btn-reset" style="position:fixed;bottom:8px;right:8px;opacity:.15;font-size:10px;padding:4px 8px;background:var(--surf2);color:var(--t2);border-radius:4px;z-index:999">reset</button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
