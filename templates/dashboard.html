<div class="dash-wrap">
  <header class="dash-top">
    <div>
      <div class="dash-date" id="tpl-today-label"></div>
      <h1 class="dash-title">Salut! 👋</h1>
    </div>
    <button class="dash-icon-btn" id="btn-edit-prefs" title="Preferințe"></button>
  </header>

  <div class="dash-grid">
    <div class="dash-next-card">
      <div class="dnc-row">
        <div>
          <div class="dnc-label">Următorul antrenament</div>
          <div class="dnc-name" id="tpl-next-day-name"></div>
          <div class="dnc-meta" id="tpl-next-day-meta"></div>
        </div>
        <div class="dnc-ring" id="tpl-next-day-ring"></div>
      </div>
      <button class="btn btn-primary btn-full" id="btn-start-next">
        <span class="btn-ico"></span> Începe antrenamentul
      </button>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-ico" id="tpl-stat-bolt"></div>
        <div class="stat-val" id="tpl-stat-sessions"></div>
        <div class="stat-lbl">Antrenamente</div>
      </div>
      <div class="stat-card">
        <div class="stat-ico" id="tpl-stat-calendar"></div>
        <div class="stat-val" id="tpl-stat-week"></div>
        <div class="stat-lbl">Săptămâna asta</div>
      </div>
      <div class="stat-card">
        <div class="stat-ico" id="tpl-stat-chart"></div>
        <div class="stat-val" id="tpl-stat-volume"></div>
        <div class="stat-lbl">Volum ridicat</div>
      </div>
    </div>

    <div class="dash-goals-wrap">
      <div class="dash-section-head head-goals">
        <span>Obiectivele tale</span>
        <button class="goals-add-btn" id="btn-add-goal" title="Adaugă obiectiv">+ Adaugă</button>
      </div>
      <div class="goals-list" id="tpl-goals"></div>
    </div>

    <div class="dash-side">
      <div class="dash-section-head head-activity">
        <span>Activitate recentă</span>
      </div>
      <div class="hist-list" id="tpl-history-list"></div>
    </div>

    <div class="dash-section-head head-soon">
      <span>Explorează</span>
    </div>
    <div class="soon-grid">
      <button class="soon-card explore-card" id="card-calendar">
        <div class="soon-ico"></div>
        <div class="soon-name">Calendar</div>
        <div class="soon-desc">Vizualizare lunară a antrenamentelor</div>
      </button>
      <button class="soon-card explore-card" id="card-progres">
        <div class="soon-ico"></div>
        <div class="soon-name">Progres</div>
        <div class="soon-desc">Grafice de evoluție per exercițiu</div>
      </button>
      <button class="soon-card explore-card" id="card-recorduri">
        <div class="soon-ico"></div>
        <div class="soon-name">Recorduri</div>
        <div class="soon-desc">Cele mai bune serii ale tale</div>
      </button>
      <button class="soon-card explore-card" id="card-realizari">
        <div class="soon-ico"></div>
        <div class="soon-name">Realizări</div>
        <div class="soon-desc">Nivelul tău de forță și insigne</div>
      </button>
      <button class="soon-card explore-card" id="card-skand">
        <div class="soon-ico"></div>
        <div class="soon-name">Skandenberg</div>
        <div class="soon-desc">Configurează-ți stilul și echipamentul</div>
        <span class="soon-chip" id="skand-chip"></span>
      </button>
    </div>

    <div class="dash-footer">
      <button class="btn btn-ghost btn-full" id="btn-view-program">
        <span class="btn-ico"></span> Vezi / modifică programul
      </button>
    </div>
  </div>
</div>
