<div class="prog-wrap">
  <div class="prog-header">
    <div class="prog-badge">Programul tău</div>
    <h1 class="prog-title">Gata de antrenat.</h1>
    <p class="prog-sub">Pornește oricare zi cu butonul de play.</p>
  </div>
  <div class="split-section">
    <div class="section-label">Split activ</div>
    <div class="split-active-card">
      <div class="sac-name" id="tpl-split-name"></div>
      <div class="sac-desc" id="tpl-split-desc"></div>
    </div>
    <div class="section-label" style="margin-top:12px">Alte variante</div>
    <div class="split-opts" id="tpl-split-opts"></div>
  </div>
  <div class="section-label" style="padding:0 16px;margin-bottom:8px">Zilele tale</div>
  <div class="days-list" id="tpl-days-list"></div>
  <div class="prog-footer" id="prog-footer">
    <button class="btn btn-primary btn-full" id="btn-save-program">
      <span class="btn-ico"></span> Salvează programul
    </button>
    <button class="btn btn-ghost btn-full" id="btn-to-dashboard" style="display:none">
      <span class="btn-ico"></span> Înapoi la dashboard
    </button>
  </div>
</div>
