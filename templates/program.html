<div class="prog-wrap">
  <div class="prog-header">
    <div class="prog-badge">Programul tău</div>
    <h1 class="prog-title">Gata de antrenat.</h1>
    <p class="prog-sub">Pornește oricare zi cu butonul de play.</p>
  </div>
  <div class="split-section">
    <div class="section-label">Split activ</div>
    <div class="split-active-card">
      <div class="sac-name" id="tpl-split-name"></div>
      <div class="sac-desc" id="tpl-split-desc"></div>
    </div>
    <div class="section-label" style="margin-top:12px">Alte variante</div>
    <div class="split-opts" id="tpl-split-opts"></div>
  </div>
  <div class="section-label" style="padding:0 16px;margin-bottom:8px">Zilele tale</div>
  <div class="days-list" id="tpl-days-list"></div>
  <div class="prog-footer" id="prog-footer">
    <button class="btn btn-primary btn-full" id="btn-save-program">
      <span class="btn-ico"></span> Salvează programul
    </button>
    <button class="btn btn-ghost btn-full" id="btn-to-dashboard">
      <span class="btn-ico"></span> Acasă
    </button>
  </div>

  <!-- Modal pentru adaugare exercitiu -->
  <div class="modal modal-add-exercise" style="display:none">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Adaugă exercițiu</h2>
        <button class="modal-close" id="close-add-exercise">✕</button>
      </div>
      <div class="modal-body">
        <div class="filter-group">
          <label>Grupa de muschi</label>
          <select id="filter-muscle-group" class="filter-select">
            <option value="">— Selectează grupa —</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Tip exercițiu</label>
          <select id="filter-exercise-type" class="filter-select">
            <option value="">— Selectează tipul —</option>
            <option value="compound">Compound</option>
            <option value="izolat">Izolat</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Exercițiu</label>
          <select id="filter-exercise" class="filter-select">
            <option value="">— Selectează exercițiu —</option>
          </select>
        </div>
        <div class="ex-preview" id="ex-preview" style="display:none">
          <div class="ex-prev-name" id="prev-name"></div>
          <div class="ex-prev-desc" id="prev-desc"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancel-add-exercise">Anulează</button>
        <button class="btn btn-primary" id="confirm-add-exercise" disabled>Adaugă în program</button>
      </div>
    </div>
  </div>
</div>
